name: Build Android APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest # Android builds use Linux (faster/cheaper)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Required for modern Expo/Android builds

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          npx expo prebuild --platform android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: caltracker-apk
          path: android/app/build/outputs/apk/release/app-release.apk
